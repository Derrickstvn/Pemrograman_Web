<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473038 - Derrick Steven Sutanto</title>
    <script src="jquery-4.0.0.min.js"></script>

    <style>
        table {
            border: 1px solid black;
            border-collapse: collapse;
        }

        td {
            width: 50px;
            height: 50px;
            text-align: center;

        }
    </style>
</head>

<body>
    <table>
        <tr>
            <td>
                <input class="head" type="checkbox"><br>
                <hr>
                <input class="body" type="checkbox"><br>
                <input class="body" type="checkbox"><br>
                <input class="body" type="checkbox"><br>
                <input class="body" type="checkbox"><br>
            </td>
        </tr>
    </table>

    <script>
        $(document).ready(function () {
            $(".head").click(function () {

                var flag = $(this).prop("checked");

                if (flag) {
                    $("input:checkbox.body").prop("checked", true);
                } else {
                    $("input:checkbox.body").prop("checked", false);
                }

            });
        });
    </script>
</body>

</html>
