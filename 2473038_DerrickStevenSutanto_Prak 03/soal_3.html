<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473038 - Derrick Steven Sutanto</title>
</head>

<body>
    <form action="post">
        <table style="border: 2px solid black;" align="center" width="300">
            <tr>
                <td colspan="3" style="padding: 3px;"><b>
                        <font size="5">Form Tambah Data User</font>
                    </b><br><br></td>
            </tr>
            <tr>
                <td>Name </td>
                <td>:</td>
                <td>
                    <input type="text" name="name" required 
                        oninvalid="this.setCustomValidity('Name is required!!!')"
                        oninput="this.setCustomValidity('')">
                </td>
            </tr>
            <tr>
                <td>Address</td>
                <td>:</td>
                <td>
                    <input type="text" name="address" required
                        oninvalid="this.setCustomValidity('Address is required!!!')"
                        oninput="this.setCustomValidity('')">
                </td>
            </tr>
            <tr>
                <td>Email</td>
                <td>:</td>
                <td><input type="email" name="email" required></td>
            </tr>
            <tr>
                <td>Home Page</td>
                <td>:</td>
                <td><input type="text" name="home" required></td>
            </tr>
            <tr>
                <td>Birthday</td>
                <td>:</td>
                <td><input type="text" name="birthday" placeholder="hh/bb/tttt" required></td>
            </tr>
            <tr>
                <td>Favorit Color</td>
                <td>:</td>
                <td><input type="color" name="color"></td>
            </tr>
            <tr>
                <td>IPK</td>
                <td>:</td>
                <td>
                    <input type="number" name="ipk" min="0" max="4" step="0.1" value="0">
                </td>
            </tr>

            <tr>
                <td>Phone Number</td>
                <td>:</td>
                <td>
                    <input type="text" name="phone" pattern="[0-9]{3}-[0-9]{7,10}"
                        title="Format: ###-####### sampai ###-##########">
                </td>
            </tr>

            <tr>
                <td></td>
                <td></td>
                <td>
                    <input type="submit" value="Add">
                </td>
            </tr>


        </table>
    </form>
</body>

</html>
